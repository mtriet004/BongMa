name: Labeler
on: [pull_request_target]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
    - uses: actions/labeler@v5  # Cập nhật từ v4 lên v5
      with:
        repo-token: "${{ secrets.GITHUB_TOKEN }}"
        # Thêm dòng này để đảm bảo nó tìm đúng file cấu hình
        configuration-path: .github/labeler.yml