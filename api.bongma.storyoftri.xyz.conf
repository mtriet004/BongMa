# Nginx config cho api.bongma.storyoftri.xyz
# WebSocket + REST proxy → Docker backend (port 3005)
#
# CÁCH DÙNG (SSH vào server 115.73.218.193):
#   sudo cp api.bongma.storyoftri.xyz.conf /etc/nginx/sites-available/api.bongma.storyoftri.xyz
#   sudo ln -s /etc/nginx/sites-available/api.bongma.storyoftri.xyz /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#   sudo certbot --nginx -d api.bongma.storyoftri.xyz
#
# Sau khi Certbot chạy, nó sẽ tự thêm SSL config vào file này.

server {
    listen 80;
    listen [::]:80;
    server_name api.bongma.storyoftri.xyz;

    # Certbot sẽ tự thêm redirect sang HTTPS ở đây.
    # Trước khi có SSL, giữ nguyên block location này.

    location / {
        proxy_pass http://localhost:3005;
        proxy_http_version 1.1;

        # CRITICAL: Forward WebSocket upgrade headers (Socket.io requires this)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for persistent WebSocket connections (24 hours)
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;

        # Buffer settings
        proxy_buffering off;
    }
}
